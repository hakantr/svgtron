<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Canlı, modern köşegen gradyan (mavi → indigo → mor) -->
    <linearGradient id="zemin" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.52" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Üstten yumuşak ışık (cam hissi) -->
    <linearGradient id="parlak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Eğri altına yumuşak gölge (derinlik) -->
    <filter id="golge" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Squircle zemin -->
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#zemin)"/>
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#parlak)"/>
  <!-- İnce üst parlak kenar -->
  <rect x="25" y="25" width="462" height="462" rx="131" fill="none"
        stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Düzenlenen vektör eğrisi (Bézier) — ikonun kahramanı -->
  <path d="M 148 360 C 148 232 364 280 364 152" filter="url(#golge)"
        fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>

  <!-- Orta düğümdeki kontrol kolları (düzenleme motifi) -->
  <g stroke="#fcd34d" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="256" x2="324" y2="191"/>
    <line x1="256" y1="256" x2="188" y2="321"/>
  </g>
  <circle cx="324" cy="191" r="16" fill="#fcd34d"/>
  <circle cx="188" cy="321" r="16" fill="#fcd34d"/>

  <!-- Çapa düğümleri (anchor) -->
  <g fill="#ffffff">
    <rect x="129" y="341" width="38" height="38" rx="9"/>
    <rect x="237" y="237" width="38" height="38" rx="9"/>
    <rect x="345" y="133" width="38" height="38" rx="9"/>
  </g>
  <g fill="#4f46e5">
    <rect x="142" y="354" width="12" height="12" rx="3"/>
    <rect x="250" y="250" width="12" height="12" rx="3"/>
    <rect x="358" y="146" width="12" height="12" rx="3"/>
  </g>
</svg>
